       class="px-3 py-2 text-sm font-medium text-decoration-none rounded-top"
       style="{% if subtab == 'month' %}background:#0ea5e9; color:#fff; border-bottom:2px solid #0ea5e9; margin-bottom:-2px;{% else %}color:#64748b;{% endif %}">

    <a href="{% url 'report_list' %}?tab=quarter"

        Báo cáo theo quý
    </a>
    <a href="{% url 'report_list' %}?tab=year"
       class="px-3 py-2 text-sm font-medium text-decoration-none rounded-top"
